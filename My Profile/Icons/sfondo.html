<head>
    <style>
        :root {
            --columnCountMax: 4;
            --layoutWidth: 1080px;
            --guideDashedColor: rgba(66, 71, 112, 0.09);
            --guideSolidColor: rgba(66, 71, 112, 0.06);
            --columnPaddingNormal: 16px;
        }

        html {
            overflow: hidden;
        }

        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }

        .Guides {
            position: fixed;
            height: 100vh;
            width: 100%;
            top: 0;
            left: 0;
            padding: 0 var(--columnPaddingNormal);
            pointer-events: none;
            overflow: hidden;
        }

        .Guides__container {
            display: grid;
            grid: 1fr / repeat(var(--columnCountMax), 1fr);
            position: relative;
            max-width: var(--layoutWidth);
            height: 100%;
            margin: 0 auto;
        }

        .Guides__guide {
            width: 1px;
            background: linear-gradient(180deg, var(--guideDashedColor), var(--guideDashedColor) 50%, transparent 0, transparent);
            background-size: 1px 8px;
        }

        .Guides__guide:first-of-type,
        .Guides__guide:last-of-type {
            background: var(--guideSolidColor);
        }

        .Guides__guide:last-of-type {
            position: absolute;
            top: 0;
            right: 0;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="Guides">
        <div class="Guides__container">
            <div class="Guides__guide"></div>
            <div class="Guides__guide"></div>
            <div class="Guides__guide"></div>
            <div class="Guides__guide"></div>
            <div class="Guides__guide"></div>
        </div>
    </div>
</body>
</html>
