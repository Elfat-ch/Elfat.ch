<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elfat</title>
    <style>
        :root {
            --bg-primary: #0a0a0afb;
            --bg-secondary: #111111f8;
            --accent-color: #ffffff;
            --text-primary: #ffffff;
            --text-secondary: #8a8a8a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            overflow-x: hidden;
            font-size: 14px;
        }

        body {
            min-height: 100vh;
            background: var(--bg-secondary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 20px;
            position: relative;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 2.6rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        h1 .highlight {
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 24px;
            max-width: 400px;
        }

        a {
            text-decoration: none;
        }

        button {
            padding: 10px 22px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        .footer {
            margin-top: auto;
            padding-top: 40px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .footer a {
            color: var(--text-secondary);
            text-decoration: underline;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: var(--text-primary);
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.4rem;
            }

            .footer {
                font-size: 0.65rem;
                padding: 0 10px;
            }
        }

        h1,
        a,
        .footer {
            position: relative;
            z-index: 1;
        }
    </style>
</head>

<body>

    <div class="main-content">
        <h1>Hello, in <span class="highlight">elfat.ch</span></h1>
        <p class="subtitle">Welcome to my personal website — take a look around.</p>

        <a href="./My%20Profile/index.html">
            <button type="button">Click me</button>
        </a>
    </div>

    <div class="footer">
        made with ❤️ by Elfat • <a href="https://github.com/Elfat-ch/Elfat.ch" target="_blank" rel="noopener noreferrer">source code</a>
    </div>

</body>

</html>
